{% extends 'base.html' %}
{% block body %}
    <h1>Register</h1>
    <form method="POST" action="{{ url_for('register')}}">
        {{ form.email.label() }}
		{{ form.email() }}
		<br/>

		{{ form.username.label() }}
		{{ form.username() }}
		<br/>

        {{ form.password.label() }}
		{{ form.password() }}
		<br/>

		<br/>
		{{ form.submit() }}
    </form>
{% endblock %}
