{% extends 'base.html' %}
{% block body %}
<h1>Channels Output</h1>
    {% for channel in channel_list %}
        <div>
            <p>
                name: {{ channel.name }}
            </p>
            <a href="{{ channel.link }}">
                link: {{ channel.link }}
            </a>
        </div>
    {% endfor %}
{% endblock %}
