{% extends 'base.html' %}
{% block body %}
    <h1>Edit Tournament</h1>
    <p>Only enter values to the data fields you want to change</p>
    <form method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">

        <label for="date_beginning">Date Beginning:</label>
        <input type="date" id="date_beginning" name="date_beginning">

        <label for="date_ending">Date Beginning:</label>
        <input type="date" id="date_ending" name="date_ending">

        <label for="city">City:</label>
        <input type="text" id="city" name="city">

        <label for="jtr_link">JTR Link:</label>
        <input type="text" id="jtr_link" name="jtr_link">

        <input type="submit">
    </form>
{% endblock %}
